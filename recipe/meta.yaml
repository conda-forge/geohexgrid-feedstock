{% set name = "geohexgrid" %}
{% set version = "3.0.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 148a69cadbbda8821b9c5d65f88b616e7c3699eaf95464d5944f7cb8197e42ed

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - geopandas >=0.11.1
    - pandas >=2
    - numpy
    - shapely

test:
  imports:
    - geohexgrid
  requires:
    - python {{ python_min }}
    - geopandas
    - numpy
    - pip
    - pytest
    - shapely
  source_files:
    - tests
  commands:
    - pip check
    - python -m pytest tests

about:
  home: https://github.com/mrcagney/geohexgrid
  summary: A Python library for making geographic flat-top hexagon grids like QGIS's `create grid` function
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - christophfink
